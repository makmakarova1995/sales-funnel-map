  input:focus { outline: none; border-color: #1f2430; background: #fff; }
  button {

    background: #1f2430; color: #fff; border: none; border-radius: 12px; padding: 13px 18px;

  .err { color: #b91c1c; font-size: 13.5px; font-weight: 600; min-height: 19px; }
</style>
