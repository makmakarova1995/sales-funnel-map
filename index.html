    b = document.getElementById('b'), e = document.getElementById('e');
f.addEventListener('submit', async function (ev) {
  ev.preventDefault();
  e.textContent = ''; b.disabled = true; b.textContent = 'Открываем…';
  try {
    var html = await open(p.value.trim());
    try { sessionStorage.setItem('k', p.value.trim()); } catch (x) {}
    show(html);
  } catch (x) {
    e.textContent = 'Код не подошёл. Проверьте раскладку и пробелы.';
    b.disabled = false; b.textContent = 'Открыть'; p.select();
  }
});
(async function () {
  var saved = null;
  try { saved = sessionStorage.getItem('k'); } catch (x) {}
  if (!saved) return;
  try { show(await open(saved)); } catch (x) {}
})();
</script>
